<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识图谱 - Memory Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Force Graph 3D -->
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.70.8/dist/3d-force-graph.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <!-- D3.js -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        body {
            background: radial-gradient(ellipse at center, #0a0a2e 0%, #050515 30%, #02020a 60%, #000003 100%);
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            width: 100%;
        }


        .navbar {
            background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%);
            box-shadow: 0 4px 6px -1px rgba(30, 64, 175, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }


        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        
        @keyframes spin {
            0% { transform: rotate(0deg); }

            100% { transform: rotate(360deg); }

        }

        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }

            to { opacity: 1; transform: translateY(0); }

        }

        
        #graph-container {
            width: 100%;
            height: calc(100vh - 140px);
            min-height: 500px;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        #graph-container canvas {
            width: 100% !important;
            height: 100% !important;
            position: relative;
            z-index: 1;
        }

        #center-marker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }


        /* 悬浮图例 */
        #floating-legend {
            position: absolute;
            top: 140px;
            left: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 100;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            transition: all 0.3s ease;
        }


        #floating-legend.collapsed .legend-content {
            display: none;
        }


        #floating-legend.collapsed .legend-header {
            border-bottom: none;
        }


        .legend-header {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }


        .legend-header:hover {
            background: #f8fafc;
        }


        .legend-title {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }


        .legend-toggle {
            font-size: 12px;
            color: #6b7280;
            transition: transform 0.3s;
        }


        #floating-legend.collapsed .legend-toggle {
            transform: rotate(-90deg);
        }


        .legend-content {
            padding: 8px;
        }

        
        /* 节点详情面板 */
        #node-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 160px);
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        
        #node-panel.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }

            to { opacity: 1; transform: translateX(0); }

        }

        
        /* 图例 */
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }


        .legend-item:hover {
            background: #f1f5f9;
        }


        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
        }


        .legend-scroll::-webkit-scrollbar {
            width: 4px;
        }


        .legend-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 2px;
        }


        .legend-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        
        /* 控制按钮 */
        .control-btn {
            background: white;
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        
        .control-btn:hover {
            background: #f8fafc;
            border-color: #3b82f6;
        }

        
        /* 搜索框 */
        #search-input {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 12px;
            width: 200px;
            transition: all 0.2s;
        }

        
        #search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        
        /* 关系类型标签 */
        .relation-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            color: #0369a1;
        }

        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 3px;
        }

        
        /* 工具提示 */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            z-index: 1000;
            max-width: 250px;
        }

    </style>
</head>

    <script>

        // ==================== 核心逻辑 ====================

        function calculateDegreeCentrality(nodes, links) {
            const degreeMap = {};
            nodes.forEach(node => degreeMap[node.id] = 0);
            links.forEach(link => {
                degreeMap[link.source.id || link.source]++;
                degreeMap[link.target.id || link.target]++;
            });
            return degreeMap;
        }

        function calculateNodeSize(node, degreeMap) {
            const degree = degreeMap[node.id] || 0;
            const memoryCount = node.memoryCount || 0;
            const baseSize = 15;
            const degreeContribution = Math.min(26, Math.sqrt(degree) * 6.5);
            const memoryContribution = Math.min(10, Math.sqrt(memoryCount) * 2);
            return baseSize + degreeContribution + memoryContribution;
        }

        function createSimpleLabel(text, options = {}) {
            const {
                fontSize = 32,
                fontFace = 'Segoe UI, Microsoft YaHei, Arial',
                textColor = '#ffffff',
                outlineColor = '#000000'
            } = options;
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            context.font = `bold ${fontSize}px ${fontFace}`;
            const metrics = context.measureText(text);
            const textWidth = metrics.width;
            
            canvas.width = Math.ceil(textWidth + 20);
            canvas.height = Math.ceil(fontSize + 16);
            
            context.font = `bold ${fontSize}px ${fontFace}`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            
            context.fillStyle = outlineColor;
            for (let ox = -2; ox <= 2; ox++) {
                for (let oy = -2; oy <= 2; oy++) {
                    context.fillText(text, x + ox, y + oy);
                }
            }
            
            context.fillStyle = textColor;
            context.fillText(text, x, y);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                opacity: 1
            });
            
            const sprite = new THREE.Sprite(spriteMaterial);
            const aspectRatio = canvas.width / canvas.height;
            sprite.scale.set(aspectRatio * 25, 25, 1);
            sprite.userData.baseScaleX = aspectRatio * 25;
            sprite.userData.baseScaleY = 25;
            
            return sprite;
        }

        function createNodeLabel(text, options = {}) {
            const { sphereRadius = 30 } = options;
            
            const group = new THREE.Group();
            
            const sprite = createSimpleLabel(text, options);
            sprite.userData.isLabel = true;
            group.add(sprite);
            
            group.userData.isLabel = true;
            group.userData.labelSprite = sprite;
            group.userData.sphereRadius = sphereRadius;
            
            return group;
        }

        function createTextSprite(text, options = {}) {
            const {
                fontSize = 48,
                fontFace = 'Segoe UI, Microsoft YaHei, Arial',
                textColor = '#ffffff',
                backgroundColor = 'rgba(0,0,0,0)',
                outlineColor = '#000000',
                outlineWidth = 2,
                padding = 10
            } = options;
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            context.font = `bold ${fontSize}px ${fontFace}`;
            const metrics = context.measureText(text);
            const textWidth = metrics.width;
            const textHeight = fontSize;
            
            canvas.width = textWidth + padding * 2 + 20;
            canvas.height = textHeight + padding * 2 + 10;
            
            context.font = `bold ${fontSize}px ${fontFace}`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            
            context.fillStyle = outlineColor;
            for (let ox = -outlineWidth; ox <= outlineWidth; ox++) {
                for (let oy = -outlineWidth; oy <= outlineWidth; oy++) {
                    context.fillText(text, x + ox, y + oy);
                }
            }
            
            context.fillStyle = textColor;
            context.fillText(text, x, y);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: true,
                depthWrite: false,
                opacity: 1
            });
            
            const sprite = new THREE.Sprite(spriteMaterial);
            const aspect = canvas.width / canvas.height;
            sprite.scale.set(30 * aspect, 30, 1);
            
            return sprite;
        }

        function renderLegend(typeCounts) {
            const legend = document.getElementById('legend');
            let html = '';
            for (const [type, count] of Object.entries(typeCounts)) {
                const config = entityTypes[type] || { color: '#94a3b8', name: type, icon: '📌' };
                html += `
                    <div class="legend-item cursor-pointer" onclick="filterByType('${type}')">
                        <div class="legend-color" style="background: ${config.color}"></div>
                        <span class="text-gray-700">${config.icon} ${config.name}</span>
                        <span class="text-gray-400 text-xs ml-auto">${count}</span>
                    </div>
                `;
            }
            legend.innerHTML = html;
        }

        function toggleLegend() {
            document.getElementById('floating-legend').classList.toggle('collapsed');
        }

        function updateBlackholeGravity() {
            window.graph.d3ReheatSimulation();
        }

        function initGraph() {
            console.log('initGraph called');
            
            const container = document.getElementById('graph-container');
            if (!container) {
                console.error('Graph container not found');
                return;
            }
            
            const rect = container.getBoundingClientRect();
            const width = rect.width || window.innerWidth;
            const height = rect.height || window.innerHeight - 140;

            console.log('Container dimensions:', { width, height });

            if (window.graph) {
                try {
                    window.graph._destructor();
                } catch (e) {
                    console.warn('Error destroying previous graph:', e);
                }
            }

            try {
                // 重新赋值给 window.graph，确保全局可用
                window.graph = ForceGraph3D()(container)
                    .width(width)
                    .height(height)
                    .graphData(graphData)
                    .nodeId('id')
                    .nodeLabel(node => node.name)
                    .nodeColor(node => node.color)
                    .nodeThreeObject(node => {
                        let size;
                        
                        if (node.id === 'blackhole') {
                            size = 50;
                        } else {
                            size = calculateNodeSize(node, graphData.degreeMap) * graphParams.nodeSizeScale;
                        }
                        
                        if (node.id === 'blackhole') {
                            const blackholeSize = size;
                            const group = new THREE.Group();
                            
                            // 1. 事件视界（Event Horizon）- 纯黑色球体，绝对黑暗
                            const eventHorizon = new THREE.Mesh(
                                new THREE.SphereGeometry(blackholeSize, 128, 128),

                                    transparent: false

                            group.add(eventHorizon);
                            
                            // 2. 光子球（Photon Sphere）- 光线围绕黑洞旋转的区域
                            const photonSphere = new THREE.Mesh(
                                new THREE.SphereGeometry(blackholeSize * 1.5, 64, 64),
                                new THREE.MeshBasicMaterial({
                                    color: 0xffffff,
                                    transparent: true,
                                    opacity: 0.1,
                                    side: THREE.BackSide,
                                    blending: THREE.AdditiveBlending
                                })
                            );
                            group.add(photonSphere);
                            
                            // 3. 主吸积盘 - 使用Canvas创建渐变纹理
                            const diskCanvas = document.createElement('canvas');
                            diskCanvas.width = 512;
                            diskCanvas.height = 512;
                            const diskCtx = diskCanvas.getContext('2d');
                            const diskGradient = diskCtx.createRadialGradient(256, 256, 50, 256, 256, 256);
                            diskGradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                            diskGradient.addColorStop(0.1, 'rgba(255, 200, 100, 0.8)');
                            diskGradient.addColorStop(0.3, 'rgba(255, 100, 50, 0.6)');
                            diskGradient.addColorStop(0.5, 'rgba(200, 50, 100, 0.4)');

                            diskCtx.fillStyle = diskGradient;
                            diskCtx.fillRect(0, 0, 512, 512);
                            
                            const diskTexture = new THREE.CanvasTexture(diskCanvas);
                            const accretionDiskGeometry = new THREE.PlaneGeometry(blackholeSize * 5, blackholeSize * 5);
                            const accretionDiskMaterial = new THREE.MeshBasicMaterial({
                                map: diskTexture,
                                transparent: true,
                                opacity: 0.9,
                                side: THREE.DoubleSide,
                                blending: THREE.AdditiveBlending,
                                depthWrite: false
                            });
                            const accretionDisk = new THREE.Mesh(accretionDiskGeometry, accretionDiskMaterial);
                            accretionDisk.rotation.x = Math.PI / 2;
                            group.add(accretionDisk);

                            innerDiskCanvas.width = 256;
                            innerDiskCanvas.height = 256;

                            innerDisk.rotation.x = Math.PI / 2;
                            group.add(innerDisk);

                                blackholeSize * 1.01,
                                blackholeSize * 1.15,

                                transparent: true,
                                opacity: 0.9,
                                side: THREE.DoubleSide,
                                blending: THREE.AdditiveBlending
                            });
                            const innerGlow = new THREE.Mesh(innerGlowGeometry, innerGlowMaterial);

                            group.add(innerGlow);

                        } else {

                            group.add(sphere);

                                textColor: '#ffffff',
                                outlineColor: '#000000',
                                sphereRadius: size
                            });

                            labelGroup.userData.nodeId = node.id;
                            labelGroup.userData.nodeSize = size;
                            group.add(labelGroup);
                            
                            group.userData.nodeId = node.id;

                    .linkTarget('target')
                    .linkLabel(link => {
                        const relName = relationTypes[link.type] || link.type;
                        return relName;
                    })
                    .linkColor(link => link.color)
                    .linkWidth(2)
                    .linkOpacity(0.6)
                    .linkDirectionalParticles(2)
                    .linkDirectionalParticleSpeed(0.01)
                    .linkDirectionalParticleWidth(2)
                    .linkThreeObjectExtend(true)
                    .linkThreeObject(link => {
                        const relName = relationTypes[link.type] || link.type;
                        const sprite = createTextSprite(relName, {
                            fontSize: 28,
                            textColor: '#ffffff',
                            outlineColor: '#000000'
                        });
                        sprite.userData.isLinkLabel = true;
                        const sId = typeof link.source === 'object' ? link.source.id : link.source;
                        const tId = typeof link.target === 'object' ? link.target.id : link.target;
                        sprite.userData.linkId = `${sId}-${tId}`;
                        return sprite;
                    })
                    .linkPositionUpdate((sprite, { start, end }) => {
                        const midPos = {
                            x: (start.x + end.x) / 2,
                            y: (start.y + end.y) / 2,
                            z: (start.z + end.z) / 2
                        };
                        sprite.position.set(midPos.x, midPos.y, midPos.z);
                    })
                    .onNodeClick(onNodeClick)
                    .onNodeDragEnd(node => { 
                        node.fx = node.x; 
                        node.fy = node.y;
                        node.fz = node.z;
                        if (node.id === 'blackhole') {
                            updateBlackholeGravity();
                        }
                    })
                    .onNodeDrag(node => {
                        if (node.id === 'blackhole') {
                            updateBlackholeGravity();
                        }
                    })
                    .onNodeRightClick(node => { 
                        node.fx = undefined; 
                        node.fy = undefined; 
                        node.fz = undefined; 
                        window.graph.d3ReheatSimulation(); 
                    })
                    .onNodeHover(onNodeHover)
                    .onLinkHover(onLinkHover)
                    .cooldownTicks(3000)
                    .d3AlphaDecay(0.005)
                    .d3VelocityDecay(graphParams.velocityDecay)
                    .cameraPosition({ x: 0, y: 500, z: 1000 })
                    .showNavInfo(true)
                    .enableNodeDrag(true)
                    .backgroundColor('#02020a');

                console.log('Force Graph created successfully:', window.graph);

                // 添加星空背景
                setTimeout(() => {

                // 注入物理法则
                if (window.graph) {
                    console.log('Setting up physics forces with params:', graphParams);
                    
                    window.graph.d3Force('link')
                        .distance(link => {
                            const sSize = calculateNodeSize(link.source, graphData.degreeMap) * graphParams.nodeSizeScale;
                            const tSize = calculateNodeSize(link.target, graphData.degreeMap) * graphParams.nodeSizeScale;
                            return sSize + tSize + graphParams.linkDistance;
                        })
                        .strength(link => {
                            // 智能卸力：如果两个节点间有 5 条线，那么每条线的硬度除以 5，防止物理坍缩！
                            return graphParams.linkStrength / link.pairCount;
                        });

                    window.graph.d3Force('charge').strength(graphParams.chargeStrength);
                    
                    window.graph.d3Force('collide', d3.forceCollide().radius(node => {
                        return calculateNodeSize(node, graphData.degreeMap) * graphParams.nodeSizeScale + graphParams.collisionBuffer;

                    // 移除默认的center力，只使用blackhole力
                    window.graph.d3Force('center', null);
                    
                    // 添加自定义3D引力（黑洞引力）
                    window.graph.d3Force('blackhole3d', alpha => {
                        const blackholeNode = graphData.nodes.find(n => n.id === 'blackhole');
                        if (!blackholeNode) return;
                        
                        const strength = graphParams.centerGravity * alpha * 60;
                        
                        graphData.nodes.forEach(node => {
                            if (node.id === 'blackhole') return;
                            if (node.fx !== undefined && node.fy !== undefined && node.fz !== undefined) return;
                            
                            const dx = blackholeNode.x - node.x;
                            const dy = blackholeNode.y - node.y;
                            const dz = blackholeNode.z - node.z;
                            const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                            
                            if (distance > 0) {
                                node.vx += (dx / distance) * strength;
                                node.vy += (dy / distance) * strength;
                                node.vz += (dz / distance) * strength;
                            }
                        });
                    });
                    
                    console.log('Physics forces setup completed');
                }

                setTimeout(() => {

        // ==================== 星空背景 ====================

        // 彗星数组
        let comets = [];

        function createComet(scene) {
            const cometGroup = new THREE.Group();
            
            // 彗星头部
            const headGeometry = new THREE.SphereGeometry(3, 16, 16);
            const headMaterial = new THREE.MeshBasicMaterial({
                color: 0xaaddff,
                transparent: true,
                opacity: 0.9
            });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            cometGroup.add(head);
            
            // 彗尾
            const tailGeometry = new THREE.BufferGeometry();
            const tailLength = 20;
            const tailVertices = [];
            
            for (let i = 0; i < tailLength; i++) {
                const t = i / tailLength;
                tailVertices.push(0, 0, -t * 80);
            }
            
            tailGeometry.setAttribute('position', new THREE.Float32BufferAttribute(tailVertices, 3));
            
            const tailMaterial = new THREE.PointsMaterial({
                color: 0x88ccff,
                size: 4,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            
            const tail = new THREE.Points(tailGeometry, tailMaterial);
            cometGroup.add(tail);
            
            // 随机起始位置（在远处，围绕黑洞）
            const angle = Math.random() * Math.PI * 2;
            const radius = 5000 + Math.random() * 10000;
            const height = (Math.random() - 0.5) * 4000;
            
            cometGroup.position.set(
                Math.cos(angle) * radius,
                height,
                Math.sin(angle) * radius
            );
            
            // 初始速度：随机方向，部分高速逃逸，部分低速被捕获
            const speedType = Math.random();
            let speed;
            if (speedType < 0.3) {
                // 30%高速彗星（可能逃逸）
                speed = 15 + Math.random() * 20;
            } else if (speedType < 0.7) {
                // 40%中速彗星（轨迹弯曲）
                speed = 5 + Math.random() * 10;
            } else {
                // 30%低速彗星（容易被捕获）
                speed = 1 + Math.random() * 4;
            }
            
            // 随机方向（不完全切向）
            const directionType = Math.random();
            let velX, velY, velZ;
            
            if (directionType < 0.5) {
                // 50%切向运动
                velX = -Math.sin(angle) * speed;
                velZ = Math.cos(angle) * speed;
                velY = (Math.random() - 0.5) * speed * 0.3;
            } else if (directionType < 0.75) {
                // 25%径向向外（逃逸）
                velX = Math.cos(angle) * speed;
                velZ = Math.sin(angle) * speed;
                velY = (Math.random() - 0.5) * speed * 0.5;
            } else {
                // 25%随机方向
                const randomAngle = Math.random() * Math.PI * 2;
                velX = Math.cos(randomAngle) * speed;
                velZ = Math.sin(randomAngle) * speed;
                velY = (Math.random() - 0.5) * speed;
            }
            
            const velocity = new THREE.Vector3(velX, velY, velZ);
            
            cometGroup.lookAt(cometGroup.position.clone().add(velocity));
            
            scene.add(cometGroup);
            
            return {
                mesh: cometGroup,
                velocity: velocity,
                life: 1.0,
                absorbed: false
            };
        }

        function updateComets() {
            if (!window.graph) return;
            const scene = window.graph.scene();
            if (!scene) return;
            
            // 获取黑洞位置和质量
            const blackholeNode = graphData.nodes.find(n => n.id === 'blackhole');
            const blackholePos = blackholeNode ? new THREE.Vector3(blackholeNode.x, blackholeNode.y, blackholeNode.z) : new THREE.Vector3(0, 0, 0);
            const blackholeSize = blackholeNode ? calculateNodeSize(blackholeNode, graphData.degreeMap) * graphParams.nodeSizeScale : 150;
            const eventHorizonRadius = blackholeSize * 1.05;
            
            // 黑洞质量（用于引力计算）
            const blackholeMass = blackholeSize * blackholeSize * 100;
            
            // 更新现有彗星
            for (let i = comets.length - 1; i >= 0; i--) {
                const comet = comets[i];
                
                // 计算与黑洞的距离
                const toBlackhole = new THREE.Vector3().subVectors(blackholePos, comet.mesh.position);
                const distanceToBlackhole = toBlackhole.length();
                
                // 引力影响范围
                const gravityRadius = 30000;
                
                if (distanceToBlackhole < gravityRadius && distanceToBlackhole > eventHorizonRadius) {
                    // 纯引力效果 - 适度引力
                    const gravityStrength = 8000000 / (distanceToBlackhole * distanceToBlackhole + 8000);
                    
                    // 引力方向指向黑洞中心
                    const gravityDir = toBlackhole.normalize();
                    
                    // 应用引力
                    const gravityForce = gravityDir.multiplyScalar(gravityStrength);
                    comet.velocity.add(gravityForce);
                }
                
                // 如果进入事件视界，被黑洞吞噬
                if (distanceToBlackhole < eventHorizonRadius) {
                    // 强吸引力
                    const pullStrength = 30;
                    const pullDir = toBlackhole.normalize();
                    comet.velocity.add(pullDir.multiplyScalar(pullStrength));
                    
                    // 彗星被吞噬效果 - 快速消失
                    comet.life -= 0.25;
                    comet.absorbed = true;
                    
                    // 缩放效果（被拉伸）
                    const scale = Math.max(0.05, comet.life);
                    comet.mesh.scale.set(scale * 4, scale * 0.2, scale * 0.2);
                } else {
                    // 正常生命周期衰减
                    comet.life -= 0.0005;
                }
                
                // 限制最大速度
                const maxSpeed = 250;
                if (comet.velocity.length() > maxSpeed) {
                    comet.velocity.normalize().multiplyScalar(maxSpeed);
                }
                
                // 更新位置
                comet.mesh.position.add(comet.velocity);
                
                // 更新朝向（朝向速度方向）
                const lookTarget = comet.mesh.position.clone().add(comet.velocity);
                comet.mesh.lookAt(lookTarget);
                
                // 更新透明度
                comet.mesh.children.forEach(child => {
                    if (child.material) {
                        child.material.opacity = Math.max(0, comet.life * (child === comet.mesh.children[0] ? 0.9 : 0.6));
                    }
                });
                
                // 移除死亡彗星或被吸收太久的彗星
                const tooLongAbsorbed = comet.absorbed && comet.life < 0.3;
                if (comet.life <= 0 || comet.mesh.position.length() > 30000 || tooLongAbsorbed) {
                    scene.remove(comet.mesh);
                    comets.splice(i, 1);
                }
            }
            
            // 随机生成新彗星（增加刷新率）
            if (Math.random() < 0.08 && comets.length < 15) {
                comets.push(createComet(scene));
            }
        }

        function updateLabelVisibility() {
            if (!window.graph || !graphData.nodes) {
                requestAnimationFrame(updateLabelVisibility);
                return;
            }
            
            const camera = window.graph.camera();
            const scene = window.graph.scene();
            const labelDistance = graphParams.labelDistance;
            
            scene.traverse((obj) => {
                if (obj.userData && obj.userData.isLabel && obj.userData.labelSprite) {
                    const nodeId = obj.userData.nodeId;
                    const node = graphData.nodes.find(n => n.id === nodeId);
                    if (!node || node.x === undefined) {
                        obj.visible = false;
                        return;
                    }
                    
                    const nodePos = new THREE.Vector3(node.x, node.y, node.z);
                    const distance = camera.position.distanceTo(nodePos);
                    
                    if (distance < labelDistance) {
                        const nodeSize = obj.userData.nodeSize || 30;
                        const toCamera = new THREE.Vector3().subVectors(camera.position, nodePos).normalize();
                        
                        const labelOffset = nodeSize * 1.15;
                        obj.position.set(
                            toCamera.x * labelOffset,
                            toCamera.y * labelOffset,
                            toCamera.z * labelOffset
                        );
                        
                        const sprite = obj.userData.labelSprite;
                        if (sprite && sprite.material) {
                            const maxTextScale = Math.min(1.5, nodeSize / 20);
                            const scaleFactor = Math.max(0.5, Math.min(maxTextScale, 400 / distance));
                            sprite.scale.set(
                                sprite.userData.baseScaleX * scaleFactor,
                                sprite.userData.baseScaleY * scaleFactor,
                                1
                            );
                            sprite.material.opacity = Math.min(1, 600 / distance);
                        }
                        
                        obj.visible = true;
                    } else {
                        obj.visible = false;
                    }
                }
                
                if (obj.userData && obj.userData.isLinkLabel) {
                    const linkId = obj.userData.linkId;
                    const [sourceId, targetId] = linkId.split('-');
                    const source = graphData.nodes.find(n => n.id === sourceId);
                    const target = graphData.nodes.find(n => n.id === targetId);
                    
                    if (!source || !target || source.x === undefined || target.x === undefined) {
                        obj.visible = false;
                        return;
                    }
                    
                    const midPos = new THREE.Vector3(
                        (source.x + target.x) / 2,
                        (source.y + target.y) / 2,
                        (source.z + target.z) / 2
                    );
                    const distance = camera.position.distanceTo(midPos);
                    
                    if (distance < labelDistance) {
                        const baseScale = 25;
                        const scaleFactor = Math.max(0.5, Math.min(1.8, 600 / distance));
                        const aspect = obj.scale.x / obj.scale.y;
                        obj.scale.set(baseScale * aspect * scaleFactor, baseScale * scaleFactor, 1);
                        obj.material.opacity = Math.min(1, 800 / distance);
                        obj.visible = true;
                    } else {
                        obj.visible = false;
                    }
                }
            });
            
            // 更新彗星动画
            updateComets();
            
            requestAnimationFrame(updateLabelVisibility);
        }

        async function searchNode() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            try {
                const response = await fetch(`/api/entities/search?q=${encodeURIComponent(query)}&limit=10`);
                const result = await response.json();

                if (!result.success || result.data.results.length === 0) {
                    alert('未找到匹配的实体');
                    return;
                }

                const matches = result.data.results;

                if (matches.length === 1) {
                    // 只有一个结果，直接选中

                }
            } catch (error) {
                console.error('搜索失败:', error);

        function focusOnNode(node) {
            if (!node || !window.graph) return;
            
            console.log('Focusing on node:', node.name, 'at position:', { x: node.x, y: node.y, z: node.z });
            
            // 获取OrbitControls
            const controls = window.graph.controls();
            
            // 计算节点的关系数量
            const nodeDegree = graphData.degreeMap[node.id] || 0;
            console.log('Node degree:', nodeDegree);
            
            // 根据关系数量计算合适的相机距离
            const baseDistance = 500;
            const distancePerRelation = 100;
            const cameraDistance = baseDistance + (nodeDegree * distancePerRelation);
            console.log('Calculated camera distance:', cameraDistance);
            
            // 获取当前相机位置
            const camera = window.graph.camera();
            const startPosition = {
                x: camera.position.x,
                y: camera.position.y,
                z: camera.position.z
            };
            
            // 目标位置
            const endPosition = {
                x: node.x,
                y: node.y,
                z: node.z + cameraDistance
            };
            
            // 动画持续时间（根据距离调整）
            const distance = Math.sqrt(
                Math.pow(endPosition.x - startPosition.x, 2) +
                Math.pow(endPosition.y - startPosition.y, 2) +
                Math.pow(endPosition.z - startPosition.z, 2)
            );
            const duration = Math.min(2000, Math.max(800, distance * 2));
            console.log('Animation duration:', duration);
            
            // 缓动函数：先快后慢
            const easeOutCubic = (t) => {
                return 1 - Math.pow(1 - t, 3);
            };
            
            // 动画开始时间
            const startTime = Date.now();
            
            // 相机动画循环
            const animateCamera = () => {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutCubic(progress);
                
                // 计算当前相机位置
                const currentX = startPosition.x + (endPosition.x - startPosition.x) * easedProgress;
                const currentY = startPosition.y + (endPosition.y - startPosition.y) * easedProgress;
                const currentZ = startPosition.z + (endPosition.z - startPosition.z) * easedProgress;
                
                // 更新相机位置
                window.graph.cameraPosition({
                    x: currentX,
                    y: currentY,
                    z: currentZ
                }, 0);
                
                // 更新target到节点位置
                if (controls && typeof THREE !== 'undefined') {
                    const targetVector = new THREE.Vector3(node.x, node.y, node.z);
                    controls.target.copy(targetVector);
                    controls.update();
                }
                
                // 继续动画或结束
                if (progress < 1) {
                    requestAnimationFrame(animateCamera);
                } else {
                    console.log('Camera animation completed');
                    console.log('Final camera position:', { x: endPosition.x, y: endPosition.y, z: endPosition.z });
                    console.log('Final target:', controls ? controls.target : 'N/A');
                }
            };
            
            // 开始动画
            requestAnimationFrame(animateCamera);
            
            // 显示节点详情面板
            showNodePanel(node);
        }

        function showNodePanel(node) {
            if (!node) return;
            
            const panel = document.getElementById('node-panel');
            const typeConfig = entityTypes[node.type] || { name: node.type, icon: '📌' };
            
            document.getElementById('panel-title').textContent = node.name;
            
            const relatedLinks = graphData.links.filter(l => {
                const sourceId = typeof l.source === 'object' ? l.source.id : l.source;
                const targetId = typeof l.target === 'object' ? l.target.id : l.target;
                return sourceId === node.id || targetId === node.id;
            });
            
            let html = `<div class="space-y-3"><div class="flex items-center gap-2">
                        <span class="px-2 py-1 rounded text-xs" style="background: ${node.color}20; color: ${node.color}">${typeConfig.name}</span>
                        <span class="text-xs text-gray-400">关联记忆: ${node.memoryCount}</span></div>
                        ${node.summary ? `<p class="text-sm text-gray-600">${node.summary}</p>` : ''}`;
            
            if (relatedLinks.length > 0) {
                html += `<div class="mt-3 pt-3 border-t border-gray-100"><h4 class="text-xs font-semibold text-gray-500 mb-2">相关关系 (${relatedLinks.length})</h4><div class="space-y-2">`;
                for (const link of relatedLinks.slice(0, 10)) {
                    const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
                    const targetId = typeof link.target === 'object' ? link.target.id : link.target;
                    const isSource = sourceId === node.id;
                    const otherNodeId = isSource ? targetId : sourceId;
                    const otherNode = graphData.nodes.find(n => String(n.id) === String(otherNodeId));
                    const relName = relationTypes[link.type] || link.type;
                    if (otherNode) {
                        html += `<div class="flex items-center gap-2 text-sm"><span class="text-gray-400">${isSource ? '→' : '←'}</span>
                                 <span class="relation-tag">${relName}</span>
                                 <span class="text-gray-700 cursor-pointer hover:text-blue-600" onclick="focusNode('${otherNode.id}')">${otherNode.name}</span></div>`;
                    }
                }
                if (relatedLinks.length > 10) html += `<p class="text-xs text-gray-400">...还有 ${relatedLinks.length - 10} 个关系</p>`;
                html += `</div></div>`;
            }
            html += `</div>`;
            document.getElementById('panel-content').innerHTML = html;
            panel.classList.add('show');
        }

        // ==================== 全能沙盒参数更新 ====================

        function updateGraphParams() {
            console.log('updateGraphParams called');
            
            if (!window.graph) {
                console.error('window.graph is null or undefined');
                return; // 绝对防护：防止控制台报错
            }

            const linkDistance = parseInt(document.getElementById('link-distance').value);
            const chargeStrength = -parseInt(document.getElementById('charge-strength').value);
            const nodeSizeScale = parseFloat(document.getElementById('node-size').value);
            const linkStrength = parseFloat(document.getElementById('link-strength').value);
            const collisionBuffer = parseInt(document.getElementById('collision-buffer').value);
            const velocityDecay = parseFloat(document.getElementById('velocity-decay').value);
            const centerGravity = parseFloat(document.getElementById('center-gravity').value);
            const labelDistance = parseInt(document.getElementById('label-distance').value);

            console.log('Parameters:', { linkDistance, chargeStrength, nodeSizeScale, linkStrength, collisionBuffer, velocityDecay, centerGravity, labelDistance });
            document.getElementById('link-distance-val').textContent = linkDistance;
            document.getElementById('charge-strength-val').textContent = Math.abs(chargeStrength);
            document.getElementById('node-size-val').textContent = nodeSizeScale.toFixed(1);
            document.getElementById('link-strength-val').textContent = linkStrength.toFixed(2);
            document.getElementById('collision-buffer-val').textContent = collisionBuffer;
            document.getElementById('velocity-decay-val').textContent = velocityDecay.toFixed(2);
            document.getElementById('center-gravity-val').textContent = centerGravity.toFixed(2);
            document.getElementById('label-distance-val').textContent = labelDistance;

            graphParams = { linkDistance, chargeStrength, nodeSizeScale, linkStrength, collisionBuffer, velocityDecay, centerGravity, labelDistance };

            const linkForce = window.graph.d3Force('link');
            console.log('linkForce:', linkForce);
            if (linkForce) {
                linkForce.distance(link => {
                    const sSize = calculateNodeSize(link.source, graphData.degreeMap) * nodeSizeScale;
                    const tSize = calculateNodeSize(link.target, graphData.degreeMap) * nodeSizeScale;
                    return sSize + tSize + linkDistance;
                }).strength(link => linkStrength / link.pairCount); // 智能卸载多重弹簧！
            }

            const chargeForce = window.graph.d3Force('charge');
            console.log('chargeForce:', chargeForce);
            if (chargeForce) chargeForce.strength(chargeStrength);

            const collisionForce = window.graph.d3Force('collide');
            console.log('collisionForce:', collisionForce);
            if (collisionForce) {
                collisionForce.radius(node => calculateNodeSize(node, graphData.degreeMap) * nodeSizeScale + collisionBuffer).iterations(3);
            }

            window.graph.d3VelocityDecay(velocityDecay);
            
            // 确保移除center力，只使用blackhole力
            window.graph.d3Force('center', null);
            
            // 更新3D引力
            window.graph.d3Force('blackhole3d', alpha => {
                const blackholeNode = graphData.nodes.find(n => n.id === 'blackhole');
                if (!blackholeNode) return;
                
                const strength = centerGravity * alpha * 60;
                
                graphData.nodes.forEach(node => {
                    if (node.id === 'blackhole') return;
                    if (node.fx !== undefined && node.fy !== undefined && node.fz !== undefined) return;
                    
                    const dx = blackholeNode.x - node.x;
                    const dy = blackholeNode.y - node.y;
                    const dz = blackholeNode.z - node.z;
                    const distance = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    
                    if (distance > 0) {
                        node.vx += (dx / distance) * strength;
                        node.vy += (dy / distance) * strength;
                        node.vz += (dz / distance) * strength;
                    }
                });
            });
            
            // 更新节点大小
            window.graph.nodeThreeObject(node => {
                let size;
                
                if (node.id === 'blackhole') {
                    size = 30;
                } else {
                    size = calculateNodeSize(node, graphData.degreeMap) * nodeSizeScale;
                }
                
                if (node.id === 'blackhole') {
                    const blackholeSize = size;
                    const group = new THREE.Group();
                    
                    // 1. 事件视界（Event Horizon）- 纯黑色球体，绝对黑暗
                    const eventHorizon = new THREE.Mesh(
                        new THREE.SphereGeometry(blackholeSize, 128, 128),
                        new THREE.MeshBasicMaterial({ 
                            color: 0x000000,
                            transparent: false
                        })
                    );
                    group.add(eventHorizon);
                    
                    // 2. 光子球（Photon Sphere）- 光线围绕黑洞旋转的区域
                    const photonSphere = new THREE.Mesh(
                        new THREE.SphereGeometry(blackholeSize * 1.5, 64, 64),
                        new THREE.MeshBasicMaterial({
                            color: 0xffffff,
                            transparent: true,
                            opacity: 0.1,
                            side: THREE.BackSide,
                            blending: THREE.AdditiveBlending
                        })
                    );
                    group.add(photonSphere);
                    
                    // 3. 主吸积盘 - 使用Canvas创建渐变纹理
                    const diskCanvas = document.createElement('canvas');
                    diskCanvas.width = 512;
                    diskCanvas.height = 512;
                    const diskCtx = diskCanvas.getContext('2d');
                    const diskGradient = diskCtx.createRadialGradient(256, 256, 50, 256, 256, 256);
                    diskGradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                    diskGradient.addColorStop(0.1, 'rgba(255, 200, 100, 0.8)');
                    diskGradient.addColorStop(0.3, 'rgba(255, 100, 50, 0.6)');
                    diskGradient.addColorStop(0.5, 'rgba(200, 50, 100, 0.4)');
                    diskGradient.addColorStop(0.7, 'rgba(100, 0, 150, 0.2)');
                    diskGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    diskCtx.fillStyle = diskGradient;
                    diskCtx.fillRect(0, 0, 512, 512);
                    
                    const diskTexture = new THREE.CanvasTexture(diskCanvas);
                    const accretionDiskGeometry = new THREE.PlaneGeometry(blackholeSize * 5, blackholeSize * 5);
                    const accretionDiskMaterial = new THREE.MeshBasicMaterial({
                        map: diskTexture,
                        transparent: true,
                        opacity: 0.9,
                        side: THREE.DoubleSide,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false
                    });
                    const accretionDisk = new THREE.Mesh(accretionDiskGeometry, accretionDiskMaterial);
                    accretionDisk.rotation.x = Math.PI / 2;
                    group.add(accretionDisk);
                    
                    // 4. 吸积盘内圈 - 更热更亮
                    const innerDiskCanvas = document.createElement('canvas');
                    innerDiskCanvas.width = 256;
                    innerDiskCanvas.height = 256;
                    const innerCtx = innerDiskCanvas.getContext('2d');
                    const innerGradient = innerCtx.createRadialGradient(128, 128, 20, 128, 128, 128);
                    innerGradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                    innerGradient.addColorStop(0.2, 'rgba(255, 220, 150, 0.9)');
                    innerGradient.addColorStop(0.4, 'rgba(255, 150, 50, 0.7)');
                    innerGradient.addColorStop(0.6, 'rgba(255, 80, 20, 0.5)');
                    innerGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    innerCtx.fillStyle = innerGradient;
                    innerCtx.fillRect(0, 0, 256, 256);
                    
                    const innerTexture = new THREE.CanvasTexture(innerDiskCanvas);
                    const innerDiskGeometry = new THREE.PlaneGeometry(blackholeSize * 2.5, blackholeSize * 2.5);
                    const innerDiskMaterial = new THREE.MeshBasicMaterial({
                        map: innerTexture,
                        transparent: true,
                        opacity: 1,
                        side: THREE.DoubleSide,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false
                    });
                    const innerDisk = new THREE.Mesh(innerDiskGeometry, innerDiskMaterial);
                    innerDisk.rotation.x = Math.PI / 2;
                    group.add(innerDisk);
                    
                    // 5. 引力透镜光环（爱因斯坦环）
                    const lensRingGeometry = new THREE.TorusGeometry(
                        blackholeSize * 2.8, 
                        blackholeSize * 0.15, 
                        32, 
                        128
                    );
                    const lensRingMaterial = new THREE.MeshBasicMaterial({
                        color: 0x88ccff,
                        transparent: true,
                        opacity: 0.6,
                        blending: THREE.AdditiveBlending
                    });
                    const lensRing = new THREE.Mesh(lensRingGeometry, lensRingMaterial);
                    lensRing.rotation.x = Math.PI / 2;
                    group.add(lensRing);
                    
                    // 6. 内部发光环 - 吸积盘最内层
                    const innerGlowGeometry = new THREE.RingGeometry(
                        blackholeSize * 1.01,
                        blackholeSize * 1.15,
                        64
                    );
                    const innerGlowMaterial = new THREE.MeshBasicMaterial({
                        color: 0xffaa00,
                        transparent: true,
                        opacity: 0.9,
                        side: THREE.DoubleSide,
                        blending: THREE.AdditiveBlending
                    });
                    const innerGlow = new THREE.Mesh(innerGlowGeometry, innerGlowMaterial);
                    innerGlow.rotation.x = Math.PI / 2;
                    group.add(innerGlow);
                    
                    return group;
                } else {
                    const group = new THREE.Group();
                    
                    const sphere = new THREE.Mesh(
                        new THREE.SphereGeometry(size, 32, 32),
                        new THREE.MeshBasicMaterial({ color: node.color })
                    );
                    group.add(sphere);
                    
                    const labelGroup = createNodeLabel(node.name, {
                        fontSize: 28,
                        textColor: '#ffffff',
                        outlineColor: '#000000',
                        sphereRadius: size
                    });
                    labelGroup.userData.isLabel = true;
                    labelGroup.userData.nodeId = node.id;
                    labelGroup.userData.nodeSize = size;
                    group.add(labelGroup);
                    
                    group.userData.nodeId = node.id;
                    
                    return group;
                }
            });
            
            window.graph.d3ReheatSimulation();
            
            console.log('Graph parameters updated successfully');
        }

            document.getElementById('loading').innerHTML = `

                <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-lg">重试</button></div>`;

        document.addEventListener('DOMContentLoaded', loadGraph);
