<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图谱引擎诊断测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/force-graph@1.43.4/dist/force-graph.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        body { background: #f0f9ff; margin: 0; padding: 20px; font-family: sans-serif; }
        .panel { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 16px; }
        #graph-container { width: 100%; height: 500px; background: white; border-radius: 12px; overflow: hidden; }
        .log { font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; background: #1e293b; color: #10b981; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2 class="text-xl font-bold mb-4">🔧 引擎参数诊断测试</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-sm font-bold mb-1">节点大小系数: <span id="scale-val">1.0</span></label>
                <input type="range" id="node-size" min="0.5" max="3.0" step="0.1" value="1.0" style="width: 100%;">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">节点斥力: <span id="charge-val">-400</span></label>
                <input type="range" id="charge-strength" min="-2000" max="-100" step="50" value="-400" style="width: 100%;">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">边距离: <span id="dist-val">100</span></label>
                <input type="range" id="link-distance" min="30" max="400" step="10" value="100" style="width: 100%;">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">阻尼系数: <span id="decay-val">0.4</span></label>
                <input type="range" id="velocity-decay" min="0.05" max="0.9" step="0.05" value="0.4" style="width: 100%;">
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="restartEngine()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">🔄 重启引擎</button>
            <button onclick="checkEngineState()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">🔍 检查引擎状态</button>
            <button onclick="clearLog()" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">🗑️ 清空日志</button>
        </div>
    </div>
    
    <div class="panel">
        <div id="graph-container"></div>
    </div>

    <div class="panel">
        <h3 class="font-bold mb-2">📋 诊断日志</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let graph = null;
        let params = {
            nodeSizeScale: 1.0,
            chargeStrength: -400,
            linkDistance: 100,
            velocityDecay: 0.4
        };

        const testData = {
            nodes: [
                { id: '1', name: '中心', val: 30 },
                { id: '2', name: 'A', val: 15 },
                { id: '3', name: 'B', val: 15 },
                { id: '4', name: 'C', val: 20 },
                { id: '5', name: 'D', val: 10 },
                { id: '6', name: 'E', val: 12 },
                { id: '7', name: 'F', val: 8 },
            ],
            links: [
                { source: '1', target: '2' },
                { source: '1', target: '3' },
                { source: '1', target: '4' },
                { source: '2', target: '5' },
                { source: '2', target: '6' },
                { source: '3', target: '7' },
                { source: '4', target: '5' },
            ]
        };

        function log(msg) {
            const el = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            el.innerHTML += `<div>[${time}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        function initGraph() {
            const container = document.getElementById('graph-container');
            
            if (graph) {
                graph._destructor();
            }

            graph = ForceGraph()(container)
                .width(container.clientWidth)
                .height(container.clientHeight)
                .graphData(testData)
                .nodeId('id')
                .nodeLabel('name')
                .nodeColor('#3b82f6')
                .linkColor('#94a3b8')
                .linkWidth(2)
                .d3VelocityDecay(params.velocityDecay)
                .nodeCanvasObject((node, ctx, globalScale) => {
                    const size = (node.val || 10) * params.nodeSizeScale;
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
                    ctx.fillStyle = node.color || '#3b82f6';
                    ctx.fill();
                    if (globalScale > 0.5) {
                        ctx.font = `${10/globalScale}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.fillText(node.name, node.x, node.y + size + 12/globalScale);
                    }
                });

            // 初始化力学
            graph.d3Force('charge').strength(params.chargeStrength);
            graph.d3Force('link').distance(params.linkDistance);

            log('✅ 引擎初始化完成');
            log(`   节点数: ${testData.nodes.length}, 边数: ${testData.links.length}`);
        }

        function restartEngine() {
            log('🔄 重新启动引擎...');
            initGraph();
        }

        function checkEngineState() {
            if (!graph) {
                log('❌ 引擎未初始化');
                return;
            }
            
            log('🔍 引擎状态:');
            log(`   nodeSizeScale: ${params.nodeSizeScale}`);
            log(`   chargeStrength: ${params.chargeStrength}`);
            log(`   linkDistance: ${params.linkDistance}`);
            log(`   velocityDecay: ${params.velocityDecay}`);
            
            // 检查 d3 force 状态
            try {
                const chargeForce = graph.d3Force('charge');
                const linkForce = graph.d3Force('link');
                log(`   d3 charge strength: ${chargeForce?.strength()}`);
                log(`   d3 link distance: ${linkForce?.distance()}`);
                log(`   d3 velocityDecay: ${graph.d3VelocityDecay()}`);
            } catch(e) {
                log(`   ⚠️ 获取状态失败: ${e.message}`);
            }
        }

        // 滑块事件处理
        document.getElementById('node-size').addEventListener('input', function() {
            params.nodeSizeScale = parseFloat(this.value);
            document.getElementById('scale-val').textContent = this.value;
            log(`📌 设置 nodeSizeScale = ${this.value}`);
            
            // 方法1: 重新设置 nodeVal
            graph.nodeVal(node => (node.val || 10) * params.nodeSizeScale);
            
            // 方法2: 重新加热
            graph.d3ReheatSimulation();
        });

        document.getElementById('charge-strength').addEventListener('input', function() {
            params.chargeStrength = parseFloat(this.value);
            document.getElementById('charge-val').textContent = this.value;
            log(`📌 设置 chargeStrength = ${this.value}`);
            
            graph.d3Force('charge').strength(params.chargeStrength);
            graph.d3ReheatSimulation();
        });

        document.getElementById('link-distance').addEventListener('input', function() {
            params.linkDistance = parseFloat(this.value);
            document.getElementById('dist-val').textContent = this.value;
            log(`📌 设置 linkDistance = ${this.value}`);
            
            graph.d3Force('link').distance(params.linkDistance);
            graph.d3ReheatSimulation();
        });

        document.getElementById('velocity-decay').addEventListener('input', function() {
            params.velocityDecay = parseFloat(this.value);
            document.getElementById('decay-val').textContent = this.value;
            log(`📌 设置 velocityDecay = ${this.value}`);
            
            graph.d3VelocityDecay(params.velocityDecay);
            graph.d3ReheatSimulation();
        });

        // 窗口大小变化时调整
        window.addEventListener('resize', () => {
            if (graph) {
                graph.width(document.getElementById('graph-container').clientWidth);
                graph.height(document.getElementById('graph-container').clientHeight);
            }
        });

        // 初始化
        window.addEventListener('load', initGraph);
    </script>
</body>
</html>
